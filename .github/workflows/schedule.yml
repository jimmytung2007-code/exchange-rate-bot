name: Collect Exchange Rates

on:
  schedule:
    - cron: '0 2,6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Xvfb)
        run: sudo apt-get update && sudo apt-get install -y xvfb fonts-dejavu-core fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium
          playwright install --with-deps chrome

      - name: Write credentials.json from secret
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run scraper
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: xvfb-run -a python scrape_exchange_rate.py

      - name: Commit and push generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git commit -m "Cap nhat anh ty gia tu dong" || echo "Khong co thay doi"
          git push

      - name: Send email with exchange rate images
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Tỷ giá hối đoái cập nhật - ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: "Đính kèm là bảng tỷ giá mua vào và bán ra mới nhất, được cập nhật tự động."
          attachments: outputs/latest_mua.jpg,outputs/latest_ban.jpg